name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (skip network tests in CI)
        env:
          SKIP_NETWORK_TESTS: "1"
        run: |
          cd ${{ github.workspace }}
          pytest tests/ -v --tb=short

      - name: Check imports
        run: |
          cd ${{ github.workspace }}
          python -c "from conversion_sim import ConversionSimulator; print('ConversionSim OK')"
          python -c "from mosaic.gene_structure import GeneStructure; print('MOSAIC OK')"
          python -c "from topopred import DonorAnalyzer; print('TopoPred OK')"
          python -c "from chrombridge import ChromatinDistancePredictor; print('ChromBridge OK')"
          python -c "from loopsim import LoopSimulator; print('LoopSim OK')"
